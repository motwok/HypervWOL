name: C++ Windows Service Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    strategy:
      matrix:
        platform: [x64]
        configuration: [Debug, Release]

    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Setup GitVersion
      uses: gittools/actions/gitversion/setup@v3
      with:
        versionSpec: '5.x'

    - name: Determine version
      id: gitversion
      uses: gittools/actions/gitversion/execute@v3

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v3

    - name: Build Code
      if: matrix.configuration == 'Release' || github.event_name != 'pull_request'
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: msbuild /m /p:Configuration=${{matrix.configuration}} /p:Platform=${{matrix.platform}} /p:VersionMajor=${{steps.gitversion.outputs.major}} /p:VersionMinor=${{steps.gitversion.outputs.minor}} /p:VersionPatch=${{steps.gitversion.outputs.patch}} /p:VersionBuild=${{steps.gitversion.outputs.commitsSinceVersionSource}} HypervWOL.slnx

    - name: Upload Build Artifacts to GitHub Actions Docs
      if: matrix.configuration == 'Release' || github.event_name != 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: HypervWOL-${{steps.gitversion.outputs.semVer}}-${{matrix.platform}}-${{matrix.configuration}}
        path: |
          ${{matrix.platform}}/${{matrix.configuration}}/*.exe
          ${{matrix.platform}}/${{matrix.configuration}}/*.pdb
          scripts/

    # AB HIER: Reine Release-Schritte, geschützt über Branch und Konfiguration
    - name: Compute release tag
      if: github.event_name == 'push' && github.ref == 'refs/heads/master' && matrix.configuration == 'Release'
      id: release_tag
      shell: pwsh
      run: |
        $tag = "v${{ steps.gitversion.outputs.majorMinorPatch }}"
        "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

    - name: Fetch PR Description for Changelog
      if: github.event_name == 'push' && github.ref == 'refs/heads/master' && matrix.configuration == 'Release'
      id: get_pr
      uses: actions/github-script@v9
      with:
        script: |
          const result = await github.rest.repos.listPullRequestsAssociatedWithCommit({
            owner: context.repo.owner,
            repo: context.repo.repo,
            commit_sha: context.sha,
          });

          const prs = result.data;
          let prDescription = "No PR description found for this release.";

          if (prs && prs.length > 0 && prs[0].body) {
            prDescription = prs[0].body;
          }

          const fs = require('fs');
          fs.writeFileSync('./CHANGELOG.md', prDescription, 'utf-8');

    - name: Check if release already exists
      if: github.event_name == 'push' && github.ref == 'refs/heads/master' && matrix.configuration == 'Release'
      id: release_check
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $tag = "${{ steps.release_tag.outputs.tag }}"
        gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
        $exists = ($LASTEXITCODE -eq 0)
        if ($exists) {
          "exists=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        } else {
          "exists=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        }
        exit 0

    - name: Create Release Archive (with Release Notes)
      if: github.event_name == 'push' && github.ref == 'refs/heads/master' && matrix.configuration == 'Release' && steps.release_check.outputs.exists == 'false'
      shell: pwsh
      run: |
        if (Test-Path ./release/x64) { Remove-Item ./release/x64 -Recurse -Force }

        New-Item -ItemType Directory -Force -Path ./release/x64
        Copy-Item -Path "${{matrix.platform}}/${{matrix.configuration}}/*" -Destination ./release/x64 -Force
        
        $filesToArchive = Get-Item ./release/x64/*
        if (Test-Path ./LICENSE.txt) { $filesToArchive += Get-Item ./LICENSE.txt }
        if (Test-Path ./INSTALL.md)   { $filesToArchive += Get-Item ./INSTALL.md }
        if (Test-Path ./CHANGELOG.md) { $filesToArchive += Get-Item ./CHANGELOG.md }
        
        Compress-Archive -Path $filesToArchive -DestinationPath HypervWOL-${{steps.gitversion.outputs.semVer}}-x64.zip

    - name: Create GitHub Release with asset
      if: github.event_name == 'push' && github.ref == 'refs/heads/master' && matrix.configuration == 'Release' && steps.release_check.outputs.exists == 'false'
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
      run: |
        # KORREKTUR: Variablenauflösung im Titel über doppelte Anführungszeichen sichergestellt
        gh release create $env:RELEASE_TAG "HypervWOL-${{steps.gitversion.outputs.semVer}}-x64.zip" --target master --notes-file CHANGELOG.md --title "Release $env:RELEASE_TAG"
        
        if (Test-Path ./CHANGELOG.md) { Remove-Item ./CHANGELOG.md -Force }
