name: C++ Windows Service Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        platform: [x64]
        configuration: [Debug, Release]
        node-version: [latest]

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup GitVersion
      uses: gittools/actions/gitversion/setup@v1.2.0
      with:
        versionSpec: '5.x'

    - name: Determine version
      id: gitversion
      uses: gittools/actions/gitversion/execute@v1.2.0

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: msbuild /m /p:Configuration=${{matrix.configuration}} /p:Platform=${{matrix.platform}} /p:VersionMajor=${{steps.gitversion.outputs.major}} /p:VersionMinor=${{steps.gitversion.outputs.minor}} /p:VersionPatch=${{steps.gitversion.outputs.patch}} /p:VersionBuild=${{steps.gitversion.outputs.commitsSinceVersionSource}} HypervWOL.slnx

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: HypervWOL-${{steps.gitversion.outputs.semVer}}-${{matrix.platform}}-${{matrix.configuration}}
        path: |
          ${{matrix.platform}}/${{matrix.configuration}}/*.exe
          ${{matrix.platform}}/${{matrix.configuration}}/*.pdb
          scripts/

  release-master:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup GitVersion
      uses: gittools/actions/gitversion/setup@v1.2.0
      with:
        versionSpec: '5.x'

    - name: Determine version
      id: gitversion
      uses: gittools/actions/gitversion/execute@v1.2.0

    - name: Download x64 Release Artifacts
      uses: actions/download-artifact@v4
      with:
        name: HypervWOL-${{steps.gitversion.outputs.semVer}}-x64-Release
        path: ./release/x64

    - name: Create Release Archive
      shell: pwsh
      run: |
        Compress-Archive -Path ./release/x64/* -DestinationPath HypervWOL-${{steps.gitversion.outputs.semVer}}-x64.zip

    - name: Compute release tag
      id: release_tag
      shell: pwsh
      run: |
        $tag = "v${{ steps.gitversion.outputs.majorMinorPatch }}"
        "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

    - name: Check if release already exists
      id: release_check
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $tag = "${{ steps.release_tag.outputs.tag }}"
        gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
        $exists = ($LASTEXITCODE -eq 0)
        if ($exists) {
          "exists=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        } else {
          "exists=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        }
        exit 0

    - name: Create GitHub Release with asset
      if: steps.release_check.outputs.exists == 'false'
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $tag = "${{ steps.release_tag.outputs.tag }}"
        gh release create $tag "HypervWOL-${{steps.gitversion.outputs.semVer}}-x64.zip" --target master --generate-notes --title "Release $tag"
